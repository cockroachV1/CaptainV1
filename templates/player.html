<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>KeralaCaptain - Secure Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root {
            --plyr-color-main: #e50914; 
            --primary-color: #e50914;
            --primary-glow: rgba(229, 9, 20, 0.6);
            --background-primary: #0f0f0f;
            --background-secondary: #212121;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #333;
            --card-radius: 16px;
            --transition-fast: 0.2s;
            --transition-medium: 0.4s;
            --notification-bg: rgba(20, 20, 20, 0.9);
            --info-color: #3498db;
            --warning-color: #f39c12;
        }

        body.light-mode {
            --background-primary: #f9f9f9;
            --background-secondary: #eeeeee;
            --text-primary: #030303;
            --text-secondary: #606060;
            --border-color: #dddddd;
            --notification-bg: rgba(240, 240, 240, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        button, a, input[type="button"], input[type="submit"] {
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-focus-ring-color: transparent;
        }
        button:focus, a:focus, button:active, a:active {
            outline: none;
            box-shadow: none;
        }

        body {
            background-color: var(--background-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color var(--transition-medium), color var(--transition-medium);
            user-select: none;
        }

        .video-header {
            max-width: 1280px; margin: 0 auto 25px auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px;
        }
        .header-btn {
            background: transparent; border: none; border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; color: var(--text-primary);
            cursor: pointer; transition: all var(--transition-fast) ease; text-decoration: none; flex-shrink: 0;
        }
        .header-btn:hover { background: var(--background-secondary); }
        .header-btn svg { width: 22px; height: 22px; fill: currentColor; }
        
        #video-title {
            font-size: 1.6rem; font-weight: 600; flex-grow: 1; text-align: center;
            padding: 0 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .theme-switch { display: inline-block; height: 30px; position: relative; width: 56px; }
        .theme-switch input { display: none; }
        .slider {
            background-color: var(--background-secondary); bottom: 0; cursor: pointer;
            left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            background-color: #fff; bottom: 4px; content: ""; height: 22px; left: 4px;
            position: absolute; transition: .4s; width: 22px; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }

        .video-wrapper { max-width: 1280px; width: 95%; margin: 0 auto; position: relative; }
        .player-container {
            border-radius: var(--card-radius); overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative; background: #000;
        }
        
        #ambient-canvas {
            position: absolute; top: 50%; left: 50%; width: 110%; height: 110%;
            transform: translate(-50%, -50%); z-index: 1;
            filter: blur(40px) brightness(0.8); opacity: 0;
            transition: opacity 0.7s ease-in-out; pointer-events: none;
        }
        #ambient-canvas.active { opacity: 1; }
        
        .skeleton-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100; transition: opacity 0.5s; backdrop-filter: blur(5px);
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── GENUINE BUFFER OVERLAY ─────────────────────────────────────────
           Only shown on real 'waiting' events. Never shown proactively.
           pointer-events: none — never blocks Plyr controls or fullscreen.  */
        #buffer-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.65);
            z-index: 50;
            backdrop-filter: blur(3px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #buffer-overlay.visible { opacity: 1; pointer-events: none; }

        /* SVG circular ring progress — driven by REAL videoPlayer.buffered data */
        .ring-wrapper {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .ring-svg {
            width: 80px; height: 80px;
            transform: rotate(-90deg);
            position: absolute; top: 0; left: 0;
        }
        .ring-track { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 6; }
        .ring-fill {
            fill: none; stroke: var(--primary-color); stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 201.06;   /* 2π × r=32 */
            stroke-dashoffset: 201.06;  /* 0% filled */
            transition: stroke-dashoffset 0.35s ease;
            filter: drop-shadow(0 0 6px var(--primary-color));
        }
        .ring-spin {
            fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 6;
            stroke-linecap: round; stroke-dasharray: 40 161.06;
            animation: ring-rotate 1.1s linear infinite;
        }
        @keyframes ring-rotate { to { stroke-dashoffset: -201.06; } }
        .ring-percent {
            position: relative; z-index: 1;
            font-size: 0.8rem; font-weight: 700; color: #fff;
            letter-spacing: 0.5px; line-height: 1;
        }
        .buffer-label {
            color: rgba(255,255,255,0.7); font-size: 0.8rem;
            font-weight: 500; letter-spacing: 0.3px; margin-bottom: 6px;
        }
        .slow-label {
            color: var(--warning-color); font-size: 0.72rem; margin-top: 6px;
            opacity: 0; transition: opacity 0.4s; text-align: center; padding: 0 20px;
        }
        .slow-label.visible { opacity: 1; }

        /* Skip overlay — pointer-events: none so it NEVER blocks fullscreen */
        .skip-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 21;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none; opacity: 0;
        }
        .skip-overlay.active { opacity: 1; transition: opacity 0.1s ease; }
        .skip-icon {
            color: white; background: rgba(0,0,0,0.55); border-radius: 50%;
            width: 54px; height: 54px; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            margin: 0 50px; animation: skip-pop 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .skip-icon.show { display: flex; }
        .skip-icon svg { width: 22px; height: 22px; }
        .skip-icon span { font-size: 10px; font-weight: 700; margin-top: 2px; }
        @keyframes skip-pop {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .quality-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .quality-btn {
            background: var(--background-secondary); border: none; border-radius: 20px; padding: 8px 16px;
            color: var(--text-primary); cursor: pointer; transition: all var(--transition-fast) ease; font-weight: 500;
        }
        .quality-btn:hover { background-color: var(--border-color); }
        .quality-btn.active { background: var(--primary-color); color: #fff; box-shadow: 0 0 10px var(--primary-glow); }

        #notification {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 12px 22px; border-radius: 8px; font-weight: 500; z-index: 9999;
            background: var(--notification-bg); backdrop-filter: blur(10px); color: var(--text-primary);
            opacity: 0; transition: opacity 0.3s, bottom 0.3s; pointer-events: none;
            display: flex; align-items: center; gap: 10px;
            border-left: 5px solid var(--info-color);
            max-width: 90vw; text-align: left; white-space: nowrap;
        }
        #notification.show { bottom: 100px; opacity: 1; }
        #notification.warning { border-left-color: var(--warning-color); }
        #notification.error   { border-left-color: #e74c3c; }

        .plyr { border-radius: var(--card-radius); z-index: 2; }
        .plyr--video .plyr__controls { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding-top: 20px; }
        .plyr__control--overlaid, .plyr--video .plyr__control:hover, .plyr--video .plyr__control[aria-expanded=true] { background: var(--primary-color); }

        /* ── ADS — 100% UNTOUCHED ──────────────────────────────────────── */
        .custom-ad-section {
            width: 100%; max-width: 800px; margin: 20px auto;
            text-align: center; font-family: Arial, sans-serif;
            background-color: transparent; padding: 10px;
        }
        .download-buttons-container {
            display: flex; justify-content: center; gap: 25px;
            margin-bottom: 20px; flex-wrap: wrap; padding-top: 15px;
        }
        .premium-btn-wrapper { position: relative; display: inline-block; }
        .premium-btn {
            display: inline-block;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: #ffffff !important; text-decoration: none;
            padding: 15px 30px; border-radius: 8px; font-weight: 800; font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); min-width: 180px;
            border: 1px solid #ff4b55; text-transform: uppercase;
            letter-spacing: 1px; animation: pulse 2s infinite;
        }
        .premium-btn.btn-alt {
            background: linear-gradient(135deg, #1f80e0, #125ca6);
            box-shadow: 0 4px 15px rgba(31, 128, 224, 0.4);
            border: 1px solid #4da3ff; animation-delay: 1s;
        }
        .premium-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            color: #ffffff !important; animation: none;
        }
        .badge {
            position: absolute; top: -12px; right: -10px;
            background-color: #ffcc00; color: #000000;
            font-size: 11px; font-weight: bold; padding: 4px 8px;
            border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10; border: 1px solid #fff;
        }
        .badge-alt { background-color: #00e676; color: #000; }
        @keyframes pulse {
            0%   { transform: scale(1);    }
            50%  { transform: scale(1.03); }
            100% { transform: scale(1);    }
        }
        .sponsor-text {
            color: var(--text-secondary); font-size: 11px; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .native-ad-container {
            margin-top: 10px; min-height: 100px; display: flex;
            justify-content: center; align-items: center; width: 100%;
            overflow: hidden; background: var(--background-secondary); border-radius: 8px;
        }

        @media (max-width: 768px) {
            #video-title { font-size: 1.2rem; }
            .plyr__controls__item { transform: scale(1.1); margin: 0 5px !important; }
        }
    </style>
</head>

    <script>
    (function () {
        'use strict';
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function (e) {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && ['I','C','J','K'].includes(String.fromCharCode(e.keyCode))) {
                e.preventDefault(); return false;
            }
            if (e.ctrlKey && ['U','S'].includes(String.fromCharCode(e.keyCode))) {
                e.preventDefault(); return false;
            }
        });

        function triggerSecurityViolation() {
            document.querySelectorAll('video').forEach(function(v) {
                try { v.pause(); v.src = ''; } catch (_) {}
            });
            document.body.innerHTML = [
                '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0f0f;',
                'display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;">',
                '<div style="background:#c0392b;padding:40px 60px;border-radius:12px;text-align:center;max-width:500px;">',

                '<path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>',
                '<h2 style="color:#fff;font-size:1.4rem;font-family:sans-serif;margin-bottom:12px;">Security Violation</h2>',
                '<p style="color:rgba(255,255,255,0.85);font-family:sans-serif;font-size:0.95rem;line-height:1.6;">',
                'Developer Tools are not permitted.<br>Close DevTools and refresh to continue.</p>',
                '</div></div>'
            ].join('');
        }

        var _devOpen = false;
        setInterval(function () {
            var t = performance.now();
            (function () {}['constructor']('debugger')());
            if (performance.now() - t > 100 && !_devOpen) { _devOpen = true; triggerSecurityViolation(); }
        }, 1000);
        setInterval(function () {
            if ((window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) && !_devOpen) {
                _devOpen = true; triggerSecurityViolation();
            }
        }, 1500);
    })();
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        // ── DOM refs ─────────────────────────────────────────────────────────
        var videoPlayer     = document.getElementById('video-player');
        var skeletonLoader  = document.getElementById('skeleton-loader');
        var bufferOverlay   = document.getElementById('buffer-overlay');
        var ringFill        = document.getElementById('ring-fill');
        var ringPercent     = document.getElementById('ring-percent');
        var slowLabel       = document.getElementById('slow-label');
        var videoTitle      = document.getElementById('video-title');
        var qualityControls = document.getElementById('quality-controls');
        var ambientCanvas   = document.getElementById('ambient-canvas');
        var themeToggle     = document.getElementById('theme-toggle');
        var skipOverlay     = document.getElementById('skip-overlay');
        var rewindIcon      = document.getElementById('rewind-icon');
        var forwardIcon     = document.getElementById('forward-icon');
        var playerContainer = document.getElementById('player-container');
        var notif           = document.getElementById('notification');
        var notifText       = document.getElementById('notification-text');
        var notifIcon       = document.getElementById('notification-icon');

        var player          = null;
        var animationFrameId= null;
        var ambientCtx      = ambientCanvas.getContext('2d');

        // ── State ─────────────────────────────────────────────────────────────
        // NOTE: currentBaseStreamUrl and isSwapping are GONE.
        // The Service Worker owns the token. The page just sends updates to it.
        var currentPostId        = null;
        var tokenRefreshInterval = null;
        var RING_CIRCUMFERENCE   = 201.06;  // 2π × r=32
        var SLOW_INTERNET_MS     = 6000;
        var slowInternetTimer    = null;
        var bufferRingInterval   = null;
        var notifDismissTimer    = null;

        // ════════════════════════════════════════════════════════════════════
        //  SERVICE WORKER INTEGRATION
        //  ─────────────────────────
        //  registerServiceWorker()  — registers sw.js, waits for it to control
        //                             this page before we set videoPlayer.src
        //  sendTokenToSW(token)     — postMessages a fresh token to the SW
        //                             (SW injects it into the next Range request)
        //
        //  WHY THIS ELIMINATES THE PAUSE:
        //  The old approach changed videoPlayer.src + called .load(), which
        //  destroys the playback session completely. The new approach never
        //  touches videoPlayer.src after the first assignment. The token lives
        //  entirely inside the SW. The <video> element is oblivious to it.
        // ════════════════════════════════════════════════════════════════════

        async function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) {
                console.warn('[KC] Service Worker API not available in this browser.');
                return false;
            }
            try {
                // Register the SW at root scope.
                // The backend must serve /sw.js with:
                //   Content-Type: application/javascript
                //   Cache-Control: no-cache
                var reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });

                // navigator.serviceWorker.ready resolves when an active SW
                // is controlling at least one client. We also need the SW to
                // be the controller for THIS page specifically.
                await navigator.serviceWorker.ready;

                if (!navigator.serviceWorker.controller) {
                    // First-ever registration: the SW just activated but hasn't
                    // claimed this page yet. clients.claim() in the SW's activate
                    // handler fires 'controllerchange' on this page.
                    await new Promise(function (resolve) {
                        navigator.serviceWorker.addEventListener(
                            'controllerchange', resolve, { once: true }
                        );
                    });
                }

                console.info('[KC] Service Worker active — seamless token mode enabled.');
                return true;

            } catch (err) {
                console.error('[KC] SW registration failed:', err);
                return false;
            }
        }

        // Send the latest token to the SW.
        // The SW will use it for all subsequent /secure-stream/* requests.
        // This is a zero-cost postMessage — it does NOT touch videoPlayer.src.
        function sendTokenToSW(token) {
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type:  'SET_TOKEN',
                    token: token,
                });
            }
        }

        // Extract the numeric message_id from a stream URL.
        // Input:  "https://captian-v1.onrender.com/stream/12345"  or  "/stream/12345"
        // Output: "12345"
        function extractMessageId(streamUrl) {
            var match = streamUrl.match(/\/stream\/(\d+)/);
            return match ? match[1] : null;
        }

        // ── Token fetching (from /api/get_token) ─────────────────────────────
        async function fetchToken(postId) {
            var res = await fetch(
                '/api/get_token?video_id=' + encodeURIComponent(postId) + '&_=' + Date.now()
            );
            if (!res.ok) throw new Error('Token endpoint returned ' + res.status);
            var data = await res.json();
            if (!data || !data.token) throw new Error('Token missing in API response');
            return data.token;
        }

        // ════════════════════════════════════════════════════════════════════
        //  TOKEN REFRESH — postMessage only, ZERO src changes
        //
        //  Every 40 seconds we fetch a new token and post it to the SW.
        //  The SW updates its internal state atomically.
        //  When the backend force-drops the connection at 50 s, the browser
        //  auto-retries with a Range header. The SW intercepts this retry,
        //  uses the already-refreshed token, and the backend accepts it.
        //  From the player's perspective: nothing happened. No pause. No blink.
        // ════════════════════════════════════════════════════════════════════
        function startTokenRefresh() {
            stopTokenRefresh();
            tokenRefreshInterval = setInterval(async function () {
                if (!currentPostId) return;
                try {
                    var newToken = await fetchToken(currentPostId);
                    sendTokenToSW(newToken);
                    // That's it. No src change. No load(). No currentTime save.
                    // The video element never knows a token rotation happened.
                } catch (err) {
                    // Silent fail — SW will use its last token.
                    // Token TTL is 60 s; refresh is every 40 s → 20 s grace window.
                    console.warn('[KC] Background token refresh failed silently.');
                }
            }, 40 * 1000);
        }

        function stopTokenRefresh() {
            if (tokenRefreshInterval) {
                clearInterval(tokenRefreshInterval);
                tokenRefreshInterval = null;
            }
        }

        // ── Notification helper ───────────────────────────────────────────────
        function showNotification(message, type) {
            type = type || 'info';
            notifText.textContent = message;
            notif.className = 'show' + (type !== 'info' ? ' ' + type : '');
            notifIcon.className = type === 'warning'
                ? 'fas fa-exclamation-triangle'
                : type === 'error' ? 'fas fa-times-circle' : 'fas fa-info-circle';
            clearTimeout(notifDismissTimer);
            notifDismissTimer = setTimeout(function () {
                notif.classList.remove('show');
            }, type === 'warning' ? 7000 : 4000);
        }

        // ── Real buffer percentage (from videoPlayer.buffered) ────────────────
        function getRealBufferedPercent() {
            var duration = videoPlayer.duration;
            if (!duration || isNaN(duration) || !videoPlayer.buffered.length) return 0;
            var maxEnd = 0;
            for (var i = 0; i < videoPlayer.buffered.length; i++) {
                var end = videoPlayer.buffered.end(i);
                if (end > maxEnd) maxEnd = end;
            }
            return Math.min(100, Math.round((maxEnd / duration) * 100));
        }

        function updateRing(pct) {
            // strokeDashoffset: CIRCUMFERENCE = empty (0%); 0 = full (100%)
            ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - pct / 100);
            ringPercent.textContent = pct + '%';
        }

        function startRingUpdater() {
            stopRingUpdater();
            bufferRingInterval = setInterval(function () {
                updateRing(getRealBufferedPercent());
            }, 300);
        }

        function stopRingUpdater() {
            if (bufferRingInterval) { clearInterval(bufferRingInterval); bufferRingInterval = null; }
        }

        // ── Buffer overlay — shown ONLY on genuine 'waiting' events ───────────
        function showBufferOverlay() {
            updateRing(getRealBufferedPercent());
            bufferOverlay.classList.add('visible');
            startRingUpdater();
            clearTimeout(slowInternetTimer);
            slowInternetTimer = setTimeout(function () {
                slowLabel.classList.add('visible');
                showNotification('Slow internet detected. Check your connection or refresh.', 'warning');
            }, SLOW_INTERNET_MS);
        }

        function hideBufferOverlay() {
            bufferOverlay.classList.remove('visible');
            stopRingUpdater();
            slowLabel.classList.remove('visible');
            clearTimeout(slowInternetTimer);
            updateRing(getRealBufferedPercent());
        }

        // ── Theme management ──────────────────────────────────────────────────
        themeToggle.addEventListener('change', function () {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', themeToggle.checked ? 'light' : 'dark');
        });
        function loadTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.checked = true;
            }
        }

        // ── Ambient background ────────────────────────────────────────────────
        function drawAmbientFrame() {
            if (!player || player.paused || player.ended || !videoPlayer.videoWidth) {
                cancelAnimationFrame(animationFrameId); return;
            }
            ambientCtx.drawImage(videoPlayer, 0, 0, ambientCanvas.width, ambientCanvas.height);
            animationFrameId = requestAnimationFrame(drawAmbientFrame);
        }

        // ── Double-tap skip (YouTube-style) ───────────────────────────────────
        var lastTapTime  = 0;
        var lastTapSide  = null;
        var skipIconTimer= null;

        function flashSkipIcon(side) {
            rewindIcon.classList.remove('show');
            forwardIcon.classList.remove('show');
            skipOverlay.classList.add('active');
            if (side === 'left')  rewindIcon.classList.add('show');
            if (side === 'right') forwardIcon.classList.add('show');
            clearTimeout(skipIconTimer);
            skipIconTimer = setTimeout(function () {
                skipOverlay.classList.remove('active');
                rewindIcon.classList.remove('show');
                forwardIcon.classList.remove('show');
            }, 600);
        }

        playerContainer.addEventListener('touchend', function (e) {
            var rect  = playerContainer.getBoundingClientRect();
            var touch = e.changedTouches[0];
            var tapY  = touch.clientY - rect.top;
            if (tapY > rect.height - 60) return; // let Plyr handle control bar

            var now  = Date.now();
            var tapX = touch.clientX - rect.left;
            var side = tapX < rect.width / 2 ? 'left' : 'right';

            if (now - lastTapTime < 300 && lastTapSide === side) {
                e.preventDefault();
                if (side === 'left') {
                    videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 10);
                    flashSkipIcon('left');
                } else {
                    videoPlayer.currentTime = Math.min(
                        videoPlayer.duration || Infinity, videoPlayer.currentTime + 10
                    );
                    flashSkipIcon('right');
                }
                lastTapTime = 0; lastTapSide = null;
            } else {
                lastTapTime = now; lastTapSide = side;
            }
        }, { passive: false });

        // ════════════════════════════════════════════════════════════════════
        //  QUALITY SWITCHER — unchanged logic
        //  Page reload forces backend to drop the old Telegram connection.
        //  On reload, SW is already registered and ready; a fresh token is
        //  fetched and posted to SW before the new secureUrl is set.
        // ════════════════════════════════════════════════════════════════════
        window.changeQuality = function (qualityUrl, qualityLabel) {
            stopTokenRefresh();
            stopRingUpdater();
            clearTimeout(slowInternetTimer);
            var currentTime = player ? player.currentTime : 0;
            localStorage.setItem('savedUserQuality',   qualityLabel);
            localStorage.setItem('playbackPosition',   currentTime);
            localStorage.setItem('savedBaseStreamUrl', qualityUrl);
            window.location.reload();
        };

        // ════════════════════════════════════════════════════════════════════
        //  SETUP PLAYER
        //
        //  secureUrl = '/secure-stream/<messageId>'
        //  This is a VIRTUAL path. The browser will never reach the backend
        //  with this URL — the Service Worker intercepts every request to it
        //  and rewrites it to '/stream/<messageId>?token=<currentToken>'.
        //
        //  videoPlayer.src is set ONCE and NEVER touched again.
        //  Token rotations are invisible to the video element.
        // ════════════════════════════════════════════════════════════════════
        async function setupPlayer(secureUrl, startTime) {
            // THE KEY LINE: set src once, never again.
            videoPlayer.src = secureUrl;
            videoPlayer.load();

            player = new Plyr(videoPlayer, {
                settings : ['captions', 'quality', 'speed', 'loop'],
                controls : ['play-large', 'play', 'progress', 'current-time',
                            'mute', 'volume', 'settings', 'fullscreen'],
                seekTime : 10,
            });

            player.on('ready', function () {
                skeletonLoader.style.display = 'none';
                var savedVolume = localStorage.getItem('playerVolume');
                if (savedVolume) player.volume = parseFloat(savedVolume);

                if (startTime > 0) {
                    // Quality-switch resume: seek then play
                    function onFirstCanPlay() {
                        videoPlayer.removeEventListener('canplay', onFirstCanPlay);
                        videoPlayer.currentTime = startTime;
                        player.play();
                        startTokenRefresh();
                    }
                    videoPlayer.addEventListener('canplay', onFirstCanPlay);
                } else {
                    // Fresh load: start token refresh cycle
                    startTokenRefresh();
                }
            });

            // ── Buffer overlay: genuine stall detection only ──────────────────
            player.on('waiting', function () { showBufferOverlay(); });
            player.on('playing', function () { hideBufferOverlay(); });
            videoPlayer.addEventListener('canplay', function () {
                if (bufferOverlay.classList.contains('visible')) hideBufferOverlay();
            });

            // ── Standard Plyr events ──────────────────────────────────────────
            player.on('play',         function () { ambientCanvas.classList.add('active');    drawAmbientFrame(); });
            player.on('pause',        function () { ambientCanvas.classList.remove('active'); cancelAnimationFrame(animationFrameId); });
            player.on('volumechange', function () { localStorage.setItem('playerVolume', player.volume); });
            player.on('ended',        function () { stopTokenRefresh(); stopRingUpdater(); });
        }

        // ════════════════════════════════════════════════════════════════════
        //  MAIN INIT
        //
        //  Order matters:
        //  1. Register SW first  (must control page before video src is set)
        //  2. Fetch initial token
        //  3. Post token to SW   (SW is now ready to inject it)
        //  4. Fetch video metadata from WP API
        //  5. Extract messageId  from the stream URL
        //  6. Set videoPlayer.src = '/secure-stream/<messageId>'  (ONCE, ever)
        //  7. Start token refresh loop (postMessage only, no src changes)
        // ════════════════════════════════════════════════════════════════════
        async function initializePlayer() {
            loadTheme();

            // ── Step 1: Register Service Worker ─────────────────────────────
            // Must complete before we set videoPlayer.src, otherwise the first
            // Range request from the video element won't be intercepted.
            var swReady = await registerServiceWorker();
            if (!swReady) {
                showNotification('Secure mode limited: Service Worker unavailable.', 'warning');
            }

            var urlParams = new URLSearchParams(window.location.search);
            var postId    = urlParams.get('view_id') || urlParams.get('id');
            var season    = urlParams.get('season')  || urlParams.get('s');
            var episode   = urlParams.get('episode') || urlParams.get('e');

            if (!postId) {
                videoTitle.textContent = 'Error: Invalid Link';
                skeletonLoader.innerHTML = '<div style="color:#ff5555;">Invalid Video Link.</div>';
                return;
            }

            currentPostId = postId;

            try {
                // ── Step 2 + 3: Fetch initial token and send to SW ───────────
                var initialToken = '';
                try {
                    initialToken = await fetchToken(postId);
                    sendTokenToSW(initialToken);
                } catch (tokenErr) {
                    console.warn('[KC] Initial token fetch failed:', tokenErr);
                    showNotification('Token fetch failed. Stream may not load.', 'warning');
                }

                // ── Step 4: Fetch video metadata from WP API ─────────────────
                var apiUrl = 'https://www.keralacaptain.shop/wp-json/keralacaptain/v1/get_player_data?post_id=' + postId;
                if (season && episode) apiUrl += '&season=' + season + '&episode=' + episode;

                var response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Video not found or access denied.');
                var videoData = await response.json();

                var displayTitle = videoData.title || 'Video';
                if (videoData.current_episode) displayTitle += ' - ' + videoData.current_episode;
                videoTitle.textContent = displayTitle;

                var qualities  = videoData.stream_links;
                var qualityMap = new Map(Object.entries(qualities));

                var sortedLabels = Array.from(qualityMap.keys()).sort(function (a, b) {
                    return parseInt(b.replace('p', '')) - parseInt(a.replace('p', ''));
                });

                var savedQuality  = localStorage.getItem('savedUserQuality');
                var savedPosition = parseFloat(localStorage.getItem('playbackPosition')) || 0;
                var initialLabel  = sortedLabels[0];
                if (savedQuality && qualityMap.has(savedQuality)) initialLabel = savedQuality;

                var initialBaseUrl = qualityMap.get(initialLabel);

                // ── Step 5: Extract the message_id from the stream URL ────────
                // Stream URL from WP API: "https://captian-v1.onrender.com/stream/12345"
                var messageId = extractMessageId(initialBaseUrl);
                if (!messageId) throw new Error('Cannot parse message_id from stream URL: ' + initialBaseUrl);

                // ── Step 6: Build the secure virtual URL ──────────────────────
                // '/secure-stream/12345' is intercepted by sw.js.
                // It is rewritten to '/stream/12345?token=<currentToken>' by the SW.
                // The <video> element ONLY ever sees '/secure-stream/12345'.
                var secureUrl = '/secure-stream/' + messageId;

                // ── Render quality buttons ────────────────────────────────────
                qualityControls.innerHTML = '';
                sortedLabels.forEach(function (label) {
                    var url = qualityMap.get(label);
                    var btn = document.createElement('button');
                    btn.className   = 'quality-btn';
                    btn.textContent = label;
                    btn.onclick     = function () { window.changeQuality(url, label); };
                    if (label === initialLabel) btn.classList.add('active');
                    qualityControls.appendChild(btn);
                });

                // ── Step 6: Launch the player ─────────────────────────────────
                await setupPlayer(secureUrl, savedPosition);

                // Clear one-time resume data
                localStorage.removeItem('playbackPosition');

            } catch (err) {
                skeletonLoader.innerHTML =
                    '<div style="color:#ff5555;padding:20px;text-align:center;">Error: ' + err.message + '</div>';
                stopTokenRefresh();
                stopRingUpdater();
                showNotification(err.message, 'error');
            }
        }

        initializePlayer();
    });
    </script>
</body>
</html>
