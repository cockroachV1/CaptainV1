<html lang="en">

    <style>
        /* --- ORIGINAL THEME VARIABLES --- */
        :root {
            --plyr-color-main: #e50914; 
            --primary-color: #e50914;
            --primary-glow: rgba(229, 9, 20, 0.6);
            --background-primary: #0f0f0f;
            --background-secondary: #212121;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #333;
            --card-radius: 16px;
            --transition-fast: 0.2s;
            --transition-medium: 0.4s;
            --notification-bg: rgba(20, 20, 20, 0.9);
            --info-color: #3498db;
            --warning-color: #f39c12;
        }

        body.light-mode {
            --background-primary: #f9f9f9;
            --background-secondary: #eeeeee;
            --text-primary: #030303;
            --text-secondary: #606060;
            --border-color: #dddddd;
            --notification-bg: rgba(240, 240, 240, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* FIX: Remove blue tap highlight and outline on all buttons/links */
        button, a, input[type="button"], input[type="submit"], .quality-btn, .header-btn, .premium-btn {
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-focus-ring-color: transparent;
        }
        button:focus, a:focus, button:active, a:active {
            outline: none;
            box-shadow: none;
        }

        body {
            background-color: var(--background-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color var(--transition-medium), color var(--transition-medium);
            user-select: none;
        }

        /* --- HEADER STYLES --- */
        .video-header {
            max-width: 1280px; margin: 0 auto 25px auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px;
        }
        .header-btn {
            background: transparent; border: none; border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; color: var(--text-primary);
            cursor: pointer; transition: all var(--transition-fast) ease; text-decoration: none; flex-shrink: 0;
        }
        .header-btn:hover { background: var(--background-secondary); }
        .header-btn svg { width: 22px; height: 22px; fill: currentColor; }
        
        #video-title {
            font-size: 1.6rem; font-weight: 600; flex-grow: 1; text-align: center;
            padding: 0 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .theme-switch { display: inline-block; height: 30px; position: relative; width: 56px; }
        .theme-switch input { display: none; }
        .slider {
            background-color: var(--background-secondary); bottom: 0; cursor: pointer;
            left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            background-color: #fff; bottom: 4px; content: ""; height: 22px; left: 4px;
            position: absolute; transition: .4s; width: 22px; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* --- PLAYER STYLES --- */
        .video-wrapper { max-width: 1280px; width: 95%; margin: 0 auto; position: relative;}
        .player-container {
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative; background: #000;
        }
        
        #ambient-canvas {
            position: absolute; top: 50%; left: 50%; width: 110%; height: 110%;
            transform: translate(-50%, -50%); z-index: 1;
            filter: blur(40px) brightness(0.8); opacity: 0;
            transition: opacity 0.7s ease-in-out; pointer-events: none;
        }
        #ambient-canvas.active { opacity: 1; }
        
        .skeleton-loader, .loading-spinner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100; transition: opacity 0.5s; backdrop-filter: blur(5px);
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .skip-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 21;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none; opacity: 0;
        }
        .skip-overlay.active { opacity: 1; transition: opacity 0.1s ease; }
        .skip-icon {
            color: white; background: rgba(0,0,0,0.6); border-radius: 50%;
            width: 50px; height: 50px; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            margin: 0 60px; animation: skip-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .skip-icon.show { display: flex; }
        .skip-icon svg { width: 24px; height: 24px; }
        .skip-icon span { font-size: 11px; font-weight: bold; margin-top: 1px; }
        @keyframes skip-pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .quality-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .quality-btn {
            background: var(--background-secondary); border: none; border-radius: 20px; padding: 8px 16px;
            color: var(--text-primary); cursor: pointer; transition: all var(--transition-fast) ease; font-weight: 500;
        }
        .quality-btn:hover { background-color: var(--border-color); }
        .quality-btn.active { background: var(--primary-color); color: #fff; box-shadow: 0 0 10px var(--primary-glow); }

        #notification {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 12px 22px; border-radius: 8px; font-weight: 500; z-index: 9999;
            background: var(--notification-bg); backdrop-filter: blur(10px); color: var(--text-primary);
            opacity: 0; transition: opacity 0.3s, bottom 0.3s; pointer-events: none;
            display: flex; align-items: center; gap: 10px;
            border-left: 5px solid var(--info-color);
        }
        #notification.show { bottom: 100px; opacity: 1; }
        #notification.warning { border-left-color: var(--warning-color); }

        .plyr { border-radius: var(--card-radius); z-index: 2; }
        .plyr--video .plyr__controls { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding-top: 20px; }
        .plyr__control--overlaid, .plyr--video .plyr__control:hover, .plyr--video .plyr__control[aria-expanded=true] { background: var(--primary-color); }

        /* --- ADVERTISEMENT SECTION STYLES (BELOW PLAYER) --- */
        .custom-ad-section {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: transparent;
            padding: 10px;
        }
        .download-buttons-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding-top: 15px; 
        }
        .premium-btn-wrapper {
            position: relative;
            display: inline-block;
        }
        .premium-btn {
            display: inline-block;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: #ffffff !important;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            min-width: 180px;
            border: 1px solid #ff4b55;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite; 
        }
        .premium-btn.btn-alt {
            background: linear-gradient(135deg, #1f80e0, #125ca6);
            box-shadow: 0 4px 15px rgba(31, 128, 224, 0.4);
            border: 1px solid #4da3ff;
            animation-delay: 1s; 
        }
        .premium-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            color: #ffffff !important;
            animation: none; 
        }
        .badge {
            position: absolute;
            top: -12px;
            right: -10px;
            background-color: #ffcc00; 
            color: #000000;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
            border: 1px solid #fff;
        }
        .badge-alt {
            background-color: #00e676; 
            color: #000;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .sponsor-text {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .native-ad-container {
            margin-top: 10px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
            background: var(--background-secondary);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            #video-title { font-size: 1.2rem; }
            .plyr__controls__item { transform: scale(1.1); margin: 0 5px !important; }
        }
    </style>
</head>

    <!-- ============================================================ -->
    <!--   FEATURE 3: AGGRESSIVE ANTI-DEBUGGING                       -->
    <!--   Runs BEFORE anything else loads. Kills devtools instantly.  -->
    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ── Basic keyboard shortcut block ──────────────────────
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', function(e) {
                if (e.keyCode === 123) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.shiftKey && ['I','C','J','K'].includes(String.fromCharCode(e.keyCode))) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.keyCode === 'S'.charCodeAt(0)) { e.preventDefault(); return false; }
            });

            // ── Security violation handler ─────────────────────────
            // Called whenever devtools are detected
            function triggerSecurityViolation() {
                // Pause any playing video immediately
                const vids = document.querySelectorAll('video');
                vids.forEach(v => { try { v.pause(); v.src = ''; } catch(err) {} });

                // Wipe the entire page with a red warning
                document.body.innerHTML = [
                    '<div style="',
                    'position:fixed;top:0;left:0;width:100%;height:100%;',
                    'background:#0f0f0f;display:flex;flex-direction:column;',
                    'align-items:center;justify-content:center;z-index:99999;">',
                    '<div style="background:#c0392b;padding:40px 60px;border-radius:12px;text-align:center;max-width:500px;">',
                    '<svg width="64" height="64" viewBox="0 0 24 24" fill="#fff" style="margin-bottom:16px">',
                    '<path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/>',
                    '</svg>',
                    '<h2 style="color:#fff;font-size:1.4rem;font-family:sans-serif;margin-bottom:12px;">',
                    'Security Violation</h2>',
                    '<p style="color:rgba(255,255,255,0.85);font-family:sans-serif;font-size:0.95rem;line-height:1.6;">',
                    'Developer Tools are not permitted on this page.<br>',
                    'Please close DevTools and refresh to continue.',
                    '</p></div></div>'
                ].join('');
            }

            // ── Method 1: Debugger timing trap ────────────────────
            // If DevTools are open, the debugger statement causes a
            // measurable time delay (> threshold ms).
            var _devtoolsOpen = false;
            var _devtoolsCheckInterval = setInterval(function() {
                var start = performance.now();
                // This is a no-op in normal execution but halts in DevTools
                (function() { /* empty */ }['constructor']('debugger')());
                var elapsed = performance.now() - start;
                if (elapsed > 100) {
                    if (!_devtoolsOpen) {
                        _devtoolsOpen = true;
                        clearInterval(_devtoolsCheckInterval);
                        triggerSecurityViolation();
                    }
                }
            }, 1000);

            // ── Method 2: Window size heuristic ───────────────────
            // DevTools docked to the side/bottom reduce window size.
            var _widthThreshold  = window.outerWidth  - window.innerWidth  > 160;
            var _heightThreshold = window.outerHeight - window.innerHeight > 160;
            setInterval(function() {
                var widthDiff  = window.outerWidth  - window.innerWidth;
                var heightDiff = window.outerHeight - window.innerHeight;
                if (widthDiff > 160 || heightDiff > 160) {
                    if (!_devtoolsOpen) {
                        _devtoolsOpen = true;
                        triggerSecurityViolation();
                    }
                }
            }, 1500);

        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // ── DOM refs ───────────────────────────────────────────
            const videoPlayer    = document.getElementById('video-player');
            const skeletonLoader = document.getElementById('skeleton-loader');
            const loadingSpinner = document.getElementById('loading-spinner');
            const videoTitle     = document.getElementById('video-title');
            const qualityControls= document.getElementById('quality-controls');
            const ambientCanvas  = document.getElementById('ambient-canvas');
            const themeToggle    = document.getElementById('theme-toggle');

            let player, hls, animationFrameId;
            const ambientCtx = ambientCanvas.getContext('2d');

            // ──────────────────────────────────────────────────────
            //  FEATURE 1: ROLLING TOKEN SYSTEM
            //  currentStreamToken is injected by HLS.js xhrSetup
            //  into every chunk request URL automatically.
            // ──────────────────────────────────────────────────────
            let currentStreamToken  = 'INITIAL_TOKEN'; // Will be replaced on first fetch
            let currentVideoId      = null;            // Set after API response
            let tokenRefreshInterval= null;

            /**
             * Silently fetches a fresh token from the backend.
             * Your Python/aiohttp endpoint should return JSON: { "token": "xyz..." }
             */
            async function refreshToken() {
                if (!currentVideoId) return;
                try {
                    const res  = await fetch(`/api/get_token?video_id=${currentVideoId}&_=${Date.now()}`);
                    if (!res.ok) throw new Error('Token fetch failed');
                    const data = await res.json();
                    if (data && data.token) {
                        currentStreamToken = data.token;
                        // No UI feedback needed — seamless to the user
                    }
                } catch (err) {
                    // Silently fail; the backend will invalidate stale tokens
                    // and the player will show a natural buffering error
                    console.warn('[KC] Token refresh failed silently.');
                }
            }

            /**
             * Start the rolling 45-second token refresh loop.
             * Token expires every 60 s on the backend, so 45 s gives
             * a 15-second overlap — zero interruption for normal viewers,
             * but download managers holding an old URL will fail at 60 s.
             */
            function startTokenRefresh() {
                stopTokenRefresh(); // clear any previous interval
                tokenRefreshInterval = setInterval(refreshToken, 45 * 1000);
            }

            function stopTokenRefresh() {
                if (tokenRefreshInterval) {
                    clearInterval(tokenRefreshInterval);
                    tokenRefreshInterval = null;
                }
            }

            // ── Theme Management (unchanged) ───────────────────────
            themeToggle.addEventListener('change', () => {
                document.body.classList.toggle('light-mode');
                localStorage.setItem('theme', themeToggle.checked ? 'light' : 'dark');
            });
            function loadTheme() {
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('light-mode');
                    themeToggle.checked = true;
                }
            }

            // ── Ambient Background (unchanged) ─────────────────────
            function drawAmbientFrame() {
                if (!player || player.paused || player.ended || !videoPlayer.videoWidth) {
                    cancelAnimationFrame(animationFrameId);
                    return;
                }
                ambientCtx.drawImage(videoPlayer, 0, 0, ambientCanvas.width, ambientCanvas.height);
                animationFrameId = requestAnimationFrame(drawAmbientFrame);
            }

            // ──────────────────────────────────────────────────────
            //  FEATURE 4: QUALITY SWITCHER — EXACTLY AS ORIGINAL
            //  Saves time + quality, reloads page → forces backend
            //  to drop old Telegram connection and open a fresh one.
            // ──────────────────────────────────────────────────────
            window.changeQuality = function(qualityUrl, qualityLabel) {
                const currentTime = player ? player.currentTime : 0;
                localStorage.setItem('savedUserQuality', qualityLabel);
                localStorage.setItem('playbackPosition',  currentTime);
                window.location.reload();
            };

            // ──────────────────────────────────────────────────────
            //  FEATURE 2: BLOB URL OBFUSCATION  +
            //  FEATURE 1: HLS.js xhrSetup TOKEN INJECTION
            // ──────────────────────────────────────────────────────

            /**
             * Fetches the .m3u8 manifest through JS (invisible in the
             * browser's Network tab URL bar as a playable link),
             * converts it to a Blob URL, and passes THAT to HLS.js.
             *
             * HLS.js xhrSetup intercepts EVERY segment (.ts / .m4s)
             * request and appends the latest currentStreamToken,
             * so chunks are always fetched with a fresh credential.
             */
            async function fetchAndBlobify(sourceUrl) {
                try {
                    const res = await fetch(sourceUrl, { credentials: 'include' });
                    if (!res.ok) throw new Error('Manifest fetch failed');
                    const blob    = await res.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    return blobUrl;
                } catch (err) {
                    // Fallback: use direct URL (non-blob). Segment tokens still work.
                    console.warn('[KC] Blob obfuscation failed, using direct URL.');
                    return sourceUrl;
                }
            }

            async function setupPlayer(sourceUrl, startTime = 0) {
                const isHls = sourceUrl.includes('.m3u8');

                if (isHls && Hls.isSupported()) {

                    // Step 1: Fetch manifest and hide the real URL behind a Blob
                    const manifestSource = await fetchAndBlobify(sourceUrl);

                    // Step 2: Create HLS instance with token-injection xhrSetup
                    hls = new Hls({
                        maxBufferLength: 30,  // Keep buffer small

                        // ── FEATURE 1 CORE: xhrSetup ──────────────
                        // Called before EVERY XHR (manifest re-fetch, segments, keys).
                        // We append the live token to each real URL.
                        // The Blob URL manifest is local so no token needed for it,
                        // but segment URLs are real server URLs and DO need the token.
                        xhrSetup: function(xhr, url) {
                            // Only append token to real server requests, not blob: URLs
                            if (!url.startsWith('blob:')) {
                                const separator = url.includes('?') ? '&' : '?';
                                const securedUrl = `${url}${separator}token=${currentStreamToken}`;
                                xhr.open('GET', securedUrl, true);
                            }
                        }
                    });

                    hls.loadSource(manifestSource);
                    hls.attachMedia(videoPlayer);

                    // Start the rolling token refresh once HLS is alive
                    startTokenRefresh();

                } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari native HLS — Blob + token logic not applicable here.
                    // Safari handles HLS natively without HLS.js.
                    videoPlayer.src = sourceUrl;
                } else {
                    // Non-HLS (direct .mp4 etc.)
                    videoPlayer.src = sourceUrl;
                }

                player = new Plyr(videoPlayer, {
                    settings: ['captions', 'quality', 'speed', 'loop'],
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen']
                });

                player.on('ready', () => {
                    skeletonLoader.style.display = 'none';
                    const savedVolume = localStorage.getItem('playerVolume');
                    if (savedVolume) player.volume = parseFloat(savedVolume);

                    // Resume from saved position (quality-switch resume, unchanged)
                    if (startTime > 0) {
                        player.once('canplay', () => {
                            player.currentTime = startTime;
                            player.play();
                        });
                    }
                });

                player.on('play',        () => { ambientCanvas.classList.add('active'); drawAmbientFrame(); });
                player.on('pause',       () => { ambientCanvas.classList.remove('active'); cancelAnimationFrame(animationFrameId); });
                player.on('volumechange',() => localStorage.setItem('playerVolume', player.volume));
                player.on('waiting',     () => loadingSpinner.style.display = 'flex');
                player.on('playing',     () => loadingSpinner.style.display = 'none');

                // Stop token refresh if video ends to avoid unnecessary requests
                player.on('ended', () => stopTokenRefresh());
            }

            // ── Main Init (unchanged structure) ───────────────────
            async function initializePlayer() {
                loadTheme();

                const urlParams = new URLSearchParams(window.location.search);
                const postId  = urlParams.get('view_id') || urlParams.get('id');
                const season  = urlParams.get('season')  || urlParams.get('s');
                const episode = urlParams.get('episode') || urlParams.get('e');

                if (!postId) {
                    videoTitle.textContent = 'Error: Invalid Link';
                    skeletonLoader.innerHTML = `<div style="color: #ff5555;">Invalid Video Link.</div>`;
                    return;
                }

                // Store video ID globally so the token refresher can use it
                currentVideoId = postId;

                // Fetch initial token BEFORE starting the player
                await refreshToken();

                try {
                    let apiUrl = `https://www.keralacaptain.shop/wp-json/keralacaptain/v1/get_player_data?post_id=${postId}`;
                    if (season && episode) apiUrl += `&season=${season}&episode=${episode}`;

                    const response = await fetch(apiUrl);
                    if (!response.ok) throw new Error('Video not found or access denied.');
                    const videoData = await response.json();

                    // Set Title
                    let displayTitle = videoData.title;
                    if (videoData.current_episode) displayTitle += ` - ${videoData.current_episode}`;
                    videoTitle.textContent = displayTitle;

                    const qualities = videoData.stream_links;
                    const qualityMap = new Map(Object.entries(qualities));

                    // Sort 1080p → 720p → 480p
                    const sortedQualityLabels = Array.from(qualityMap.keys()).sort((a, b) => {
                        return parseInt(b.replace('p', '')) - parseInt(a.replace('p', ''));
                    });

                    // Resume logic (unchanged)
                    const savedQuality     = localStorage.getItem('savedUserQuality');
                    const playbackPosition = parseFloat(localStorage.getItem('playbackPosition')) || 0;
                    let initialQualityLabel = sortedQualityLabels[0];

                    if (savedQuality && qualityMap.has(savedQuality)) {
                        initialQualityLabel = savedQuality;
                    }
                    const initialUrl = qualityMap.get(initialQualityLabel);

                    // Render Quality Buttons (unchanged)
                    qualityControls.innerHTML = '';
                    sortedQualityLabels.forEach(label => {
                        const url    = qualityMap.get(label);
                        const button = document.createElement('button');
                        button.className  = 'quality-btn';
                        button.textContent= label;
                        button.onclick    = () => window.changeQuality(url, label);
                        if (label === initialQualityLabel) button.classList.add('active');
                        qualityControls.appendChild(button);
                    });

                    // Init player
                    await setupPlayer(initialUrl, playbackPosition);

                    // Clear saved position after use (unchanged)
                    localStorage.removeItem('playbackPosition');

                } catch (error) {
                    skeletonLoader.innerHTML = `<div style="color: #ff5555; padding: 20px; text-align:center;">Error: ${error.message}</div>`;
                    stopTokenRefresh();
                }
            }

            initializePlayer();
        });
    </script>
